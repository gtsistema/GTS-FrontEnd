<aside
  class="sidebar"
  [class.collapsed]="isCollapsed()"
  [class.sidebar--mobile-open]="isMobile() && mobileOpen()"
  [class.sidebar--mobile]="isMobile()"
>
  <header class="sidebar-header">
    <span class="sidebar-header__logo" [class.sidebar-header__logo--hidden]="isCollapsed()">GTSistema</span>
    <button
      type="button"
      class="sidebar-header__toggle"
      (click)="onToggleClick()"
      [attr.aria-label]="isCollapsed() ? 'Expandir menu' : 'Recolher menu'"
      [attr.aria-expanded]="!isCollapsed()"
    >
      <span class="material-symbols-outlined" aria-hidden="true">menu</span>
    </button>
  </header>
  <nav class="sidebar-nav">
    <ul class="menu">
      <li *ngFor="let item of menuItems">
        @if (item.children?.length) {
          <div class="menu-group">
            <button
              type="button"
              class="menu-item menu-item-parent"
              [class.active]="isActive(item.route)"
              (click)="toggleMenu(item.route)"
              [attr.aria-expanded]="isMenuExpanded(item.route)"
            >
              <span class="material-symbols-outlined icon">{{ item.icon }}</span>
              <span class="label" [class.hidden]="isCollapsed()">{{ item.label }}</span>
              <span class="material-symbols-outlined icon chevron" [class.hidden]="isCollapsed()">
                {{ isMenuExpanded(item.route) ? 'expand_less' : 'expand_more' }}
              </span>
            </button>
            @if (isMenuExpanded(item.route) && !isCollapsed()) {
              <ul class="submenu">
                @for (sub of item.children; track sub.route) {
                  <li>
                    <a
                      [routerLink]="sub.route"
                      class="menu-item submenu-item"
                      routerLinkActive="active"
                      [routerLinkActiveOptions]="{ exact: false }"
                    >
                      <span class="label">{{ sub.label }}</span>
                    </a>
                  </li>
                }
              </ul>
            }
          </div>
        } @else {
          <a
            [routerLink]="item.route"
            [class.active]="isActive(item.route)"
            class="menu-item"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            <span class="material-symbols-outlined icon">{{ item.icon }}</span>
            <span class="label" [class.hidden]="isCollapsed()">{{ item.label }}</span>
          </a>
        }
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <p class="version" [class.hidden]="isCollapsed()">v1.0.0</p>
    <button class="logout-btn" (click)="logout()" [title]="isCollapsed() ? 'Logout' : ''">
      <span class="material-symbols-outlined icon">logout</span>
      <span class="label" [class.hidden]="isCollapsed()">Sair</span>
    </button>
  </div>
</aside>
