<div class="page-container">
  <header class="page-header">
    <div class="page-header__row page-header__row--1">
      <h1 class="page-title">Configurações</h1>
      <p class="page-subtitle">Usuários, permissões e perfis de acesso.</p>
    </div>
    <div class="page-header__row page-header__row--2">
      <nav class="tabs" role="tablist" aria-label="Abas de Configurações">
        <a
          routerLink="/app/configuracoes/usuarios"
          routerLinkActive="tab--active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="tab"
          role="tab"
        >
          Usuários
        </a>
        <a
          routerLink="/app/configuracoes/permissoes"
          routerLinkActive="tab--active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="tab"
          role="tab"
        >
          Permissões
        </a>
        <a
          routerLink="/app/configuracoes/perfis"
          routerLinkActive="tab--active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="tab"
          role="tab"
        >
          Perfil
        </a>
      </nav>
    </div>
  </header>

  <div class="page-content">
    <router-outlet></router-outlet>
  </div>
</div>
