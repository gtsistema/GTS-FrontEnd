<div class="page-container">
  <header class="page-header page-hero">
    <div class="page-header__row page-header__row--1">
      <h1 class="page-title">Configurações</h1>
      <p class="page-subtitle">Usuários e perfis de acesso.</p>
    </div>
    <div class="page-header__row page-header__row--2">
      <nav class="tabs" role="tablist" aria-label="Abas de Configurações">
        <a
          routerLink="/app/configuracoes/usuarios"
          routerLinkActive="tab--active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="tab"
          role="tab"
        >
          Usuários
        </a>
      </nav>
    </div>
  </header>

  <div class="page-content content-card">
    <router-outlet></router-outlet>
  </div>
</div>
