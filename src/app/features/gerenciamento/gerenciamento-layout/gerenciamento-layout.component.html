<div class="page-container">
  <header class="page-header">
    <div class="page-header__row page-header__row--1">
      <h1 class="page-title">Gerenciamento</h1>
      <p class="page-subtitle">Central de gestão de acessos, usuários e administração do sistema.</p>
    </div>
    <div class="page-header__row page-header__row--2">
      <nav class="tabs" role="tablist" aria-label="Abas de Gerenciamento">
        <a
          routerLink="/app/gerenciamento"
          routerLinkActive="tab--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="tab"
          role="tab"
        >
          Acessos
        </a>
        <a
          routerLink="/app/gerenciamento/menu"
          routerLinkActive="tab--active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="tab"
          role="tab"
        >
          Menu
        </a>
        <a
          routerLink="/app/gerenciamento/perfil"
          routerLinkActive="tab--active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="tab"
          role="tab"
        >
          Perfil
        </a>
      </nav>
    </div>
  </header>

  <div class="page-content">
    <router-outlet></router-outlet>
  </div>
</div>
