<div class="layout" [class.sidebar-collapsed]="sidebarCollapsed" [class.layout--mobile]="isMobile()">
  @if (isMobile() && mobileMenuOpen()) {
    <div class="sidebar-overlay" (click)="closeMobileMenu()" aria-hidden="true"></div>
  }
  <app-sidebar
    [mobileOpen]="mobileMenuOpen()"
    [isMobile]="isMobile()"
    (collapsedChange)="onSidebarCollapsed($event)"
    (closeMobile)="closeMobileMenu()"
  ></app-sidebar>

  <div class="layout-right">
    <header class="top-bar">
      @if (isMobile()) {
        <button type="button" class="top-bar__menu-btn" (click)="toggleMobileMenu()" aria-label="Abrir menu">
          <span class="material-symbols-outlined">menu</span>
        </button>
      }
      <div class="top-bar__spacer"></div>
      <div class="theme-switcher">
        <button
          type="button"
          class="theme-switcher__btn"
          (click)="toggleTheme()"
          [attr.aria-pressed]="currentMode() === 'light'"
          [attr.aria-label]="currentMode() === 'dark' ? 'Mudar para tema claro' : 'Mudar para tema escuro'"
        >
          @if (currentMode() === 'dark') {
            <span class="material-symbols-outlined theme-switcher__icon">dark_mode</span>
            <span class="theme-switcher__label">Dark</span>
          } @else {
            <span class="material-symbols-outlined theme-switcher__icon">light_mode</span>
            <span class="theme-switcher__label">White</span>
          }
        </button>
      </div>
    </header>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
