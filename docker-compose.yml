services:
  frontend:
    image: node:22-alpine
    container_name: estacionamento-frontend
    working_dir: /app
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
